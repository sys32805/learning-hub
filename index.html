<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    /* Login + header only — no Docsify theme overrides */
    body { margin: 0; }
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f5f7f6;
      font-family: system-ui, sans-serif;
    }
    #login-screen.is-hidden { display: none; }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border: 1px solid #dde5e1;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .login-brand { margin: 0 0 6px; color: #0f766e; font-size: 1.5rem; }
    .login-sub { margin: 0 0 18px; color: #5c6f66; }
    .login-card label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #5c6f66;
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 12px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: 1px solid #c5d4cc;
      font-size: 1rem;
    }
    .login-card button[type="submit"] {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #0f766e;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .login-error { display: none; color: #b91c1c; margin: 0 0 10px; }
    .login-error.show { display: block; }
    .login-hint { margin: 14px 0 0; font-size: 0.8rem; color: #5c6f66; }

    #app-shell { display: none; }
    #app-shell.is-open { display: block; }

    /* Header sits in normal flow (no sticky fight with Docsify) */
    #top-chrome {
      position: relative;
      z-index: 10;
      background: #0f766e;
      color: #fff;
      padding: 10px 16px;
      font-family: system-ui, sans-serif;
    }
    #top-chrome-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      max-width: 100%;
    }
    #quick-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      font-size: 13px;
      flex: 1;
    }
    #quick-nav strong { margin-right: 2px; }
    #quick-nav a {
      color: #fff !important;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    #quick-nav a:hover { text-decoration: underline; }
    #logout-btn {
      margin-left: auto;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.28); }

    /* Hide GitHub corner notch that breaks the header edge */
    .github-corner { display: none !important; }

    /* Do NOT move .sidebar-toggle — that caused the green overlay on menu text */
    /* Readable left menu (vue default is too light) */
    .sidebar .app-name a,
    .sidebar h1 a {
      color: #0f766e !important;
      font-weight: 700 !important;
    }
    .sidebar .sidebar-nav li > p {
      color: #0f766e !important;
      font-weight: 700 !important;
      opacity: 1 !important;
    }
    .sidebar .sidebar-nav li a {
      color: #2c3e50 !important;
      font-weight: 500 !important;
      opacity: 1 !important;
    }
    .sidebar .sidebar-nav li.active > a {
      color: #0f766e !important;
      font-weight: 700 !important;
    }

    .markdown-section { max-width: 920px; line-height: 1.65; }
    .markdown-section table { display: table; width: 100%; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <h1 class="login-brand">Learning Hub</h1>
      <p class="login-sub">Sign in for OOPs, Spring Boot, and DSA revision.</p>
      <p id="login-error" class="login-error" role="alert"></p>
      <form id="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autocomplete="username" />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
        <button type="submit">Enter</button>
      </form>
      <p class="login-hint">Default: <code>learner</code> / <code>Learn@2026</code></p>
    </div>
  </div>

  <div id="app-shell">
    <div id="top-chrome">
      <div id="top-chrome-inner">
        <nav id="quick-nav">
          <strong>Quick:</strong>
          <a data-path="/" href="/learning-hub/#/">Home</a>
          <a data-path="/05-spring-boot/interview/README" href="/learning-hub/#/05-spring-boot/interview/README">Spring</a>
          <a data-path="/05-spring-boot/interview/why-answers" href="/learning-hub/#/05-spring-boot/interview/why-answers">Spring WHY</a>
          <a data-path="/05-spring-boot/interview/annotations" href="/learning-hub/#/05-spring-boot/interview/annotations">Annotations</a>
          <a data-path="/03-dsa-and-interview/oops/why-answers" href="/learning-hub/#/03-dsa-and-interview/oops/why-answers">OOPs WHY</a>
          <a data-path="/03-dsa-and-interview/oops/README" href="/learning-hub/#/03-dsa-and-interview/oops/README">OOPs</a>
          <a data-path="/03-dsa-and-interview/INTERVIEW-PREP" href="/learning-hub/#/03-dsa-and-interview/INTERVIEW-PREP">Roadmap</a>
        </nav>
        <button type="button" id="logout-btn">Logout</button>
      </div>
    </div>
    <div id="app">Loading…</div>
  </div>

  <script src="/learning-hub/assets/auth-config.js"></script>
  <script>
    (function () {
      var auth = window.LEARNING_HUB_AUTH || {};
      var sessionKey = auth.sessionKey || 'learning-hub-auth';
      var docsifyStarted = false;

      function isLoggedIn() {
        try { return sessionStorage.getItem(sessionKey) === '1'; } catch (e) { return false; }
      }
      function setLoggedIn(v) {
        try {
          if (v) sessionStorage.setItem(sessionKey, '1');
          else sessionStorage.removeItem(sessionKey);
        } catch (e) {}
      }

      async function sha256Hex(text) {
        var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
        return Array.from(new Uint8Array(buf)).map(function (x) {
          return x.toString(16).padStart(2, '0');
        }).join('');
      }

      function showApp() {
        document.getElementById('login-screen').classList.add('is-hidden');
        document.getElementById('app-shell').classList.add('is-open');
        startDocsify();
      }

      function startDocsify() {
        if (docsifyStarted) return;
        docsifyStarted = true;
        window.$docsify = {
          name: 'Learning Hub',
          // no repo corner — it was cutting the header edge
          basePath: '/learning-hub/',
          homepage: 'README.md',
          loadSidebar: true,
          loadNavbar: false,
          subMaxLevel: 2,
          alias: { '/.*/_sidebar.md': '/learning-hub/_sidebar.md' },
          auto2top: true,
          relativePath: false,
          routerMode: 'hash',
          notFoundPage: false,
          ext: '.md',
          search: 'auto',
          copyCode: { buttonText: 'Copy', successText: 'Copied' },
          pagination: { previousText: 'Previous', nextText: 'Next', crossChapter: true }
        };

        function load(src) {
          return new Promise(function (res, rej) {
            var s = document.createElement('script');
            s.src = src;
            s.onload = res;
            s.onerror = rej;
            document.body.appendChild(s);
          });
        }

        load('https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js')
          .then(function () { return load('https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js'); })
          .then(function () { return load('https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js'); })
          .then(function () { return load('https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js'); })
          .then(function () { return load('https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js'); })
          .then(function () {
            function fixSidebarText() {
              document.querySelectorAll('.sidebar .sidebar-nav li a').forEach(function (a) {
                a.style.setProperty('color', '#2c3e50', 'important');
                a.style.setProperty('opacity', '1', 'important');
              });
              document.querySelectorAll('.sidebar .sidebar-nav li > p, .sidebar .app-name a').forEach(function (el) {
                el.style.setProperty('color', '#0f766e', 'important');
                el.style.setProperty('opacity', '1', 'important');
              });
            }
            fixSidebarText();
            setTimeout(fixSidebarText, 300);
            setTimeout(fixSidebarText, 1000);
          })
          .catch(function () {
            document.getElementById('app').textContent = 'Failed to load. Refresh the page.';
          });
      }

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var err = document.getElementById('login-error');
        err.classList.remove('show');
        var user = document.getElementById('username').value.trim();
        var pass = document.getElementById('password').value;
        if (user !== auth.username || (await sha256Hex(pass)) !== auth.passwordSha256) {
          err.textContent = 'Invalid username or password.';
          err.classList.add('show');
          return;
        }
        setLoggedIn(true);
        showApp();
      });

      document.getElementById('logout-btn').onclick = function () {
        setLoggedIn(false);
        location.href = '/learning-hub/';
      };

      document.getElementById('quick-nav').onclick = function (e) {
        var a = e.target.closest('a[data-path]');
        if (!a) return;
        e.preventDefault();
        var path = a.getAttribute('data-path') || '/';
        if (path.charAt(0) !== '/') path = '/' + path;
        location.hash = '#' + path;
      };

      if (isLoggedIn()) showApp();
    })();
  </script>
</body>
</html>
