<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning Hub — Interview Prep</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Java interview prep: OOPs, DSA, LeetCode, Spring" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root { --theme-color: #0f766e; }
    .markdown-section { max-width: 900px; line-height: 1.65; }
    .markdown-section pre { border-radius: 8px; }
    .markdown-section table { display: table; width: 100%; overflow: auto; }
    .markdown-section a { font-weight: 600; }
    .sidebar-nav > ul > li > p { font-weight: 700; margin: 12px 0 4px; }
  </style>
</head>
<body>
  <div id="app">Loading interview prep…</div>
  <script>
    window.$docsify = {
      name: 'Interview Prep Hub',
      repo: 'https://github.com/sys32805/learning-hub',
      basePath: '/learning-hub/',
      homepage: 'README.md',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      auto2top: true,
      // Links inside a page are relative to THAT page (fixes DSA in-folder links)
      relativePath: true,
      subMaxLevel: 2,
      maxLevel: 3,
      search: {
        placeholder: 'Search interview topics…',
        noData: 'No results',
        path: 'auto',
        depth: 4
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      },
      noEmoji: false
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
