<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root { --theme-color: #0f766e; }
    .markdown-section { max-width: 920px; line-height: 1.65; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section pre { border-radius: 8px; }
    /* Keep menu open & obvious */
    .sidebar { padding-top: 0; }
    .sidebar-toggle { background-color: transparent; }
    .sidebar-toggle span { background-color: #0f766e; }
    .app-nav { margin-right: 80px; }
    .app-nav li { margin: 0 6px; }
    @media screen and (max-width: 768px) {
      .sidebar-toggle { display: block !important; }
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'Learning Hub',
      repo: 'sys32805/learning-hub',
      // GitHub project pages live under /learning-hub/
      basePath: '/learning-hub/',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      // MUST include /learning-hub/ — bare /_sidebar.md 404s on github.io root
      // cache-bust query so browsers pick up menu updates
      alias: {
        '/.*/_sidebar.md': '/learning-hub/_sidebar.md?v=20260718b',
        '/.*/_navbar.md': '/learning-hub/_navbar.md?v=20260718b'
      },
      requestHeaders: {
        'cache-control': 'no-cache'
      },
      auto2top: true,
      relativePath: false,
      routerMode: 'hash',
      // Do NOT use custom 404 — it hid real routing errors
      notFoundPage: false,
      search: {
        placeholder: 'Search notes…',
        noData: 'No results',
        depth: 3,
        pathNamespaces: ['/']
      },
      copyCode: { buttonText: 'Copy', successText: 'Copied' },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
</body>
</html>
