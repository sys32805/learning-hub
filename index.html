<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root { --theme-color: #0f766e; }
    .markdown-section { max-width: 920px; line-height: 1.65; padding-top: 12px; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section pre { border-radius: 8px; }
    .sidebar-toggle span { background-color: #0f766e; }
    @media screen and (max-width: 768px) {
      .sidebar-toggle { display: block !important; }
    }
    #quick-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #0f766e;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    #quick-nav strong { margin-right: 4px; }
    #quick-nav a {
      color: #fff !important;
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
    }
    #quick-nav a:hover { opacity: 0.85; }
    body { margin: 0; }
    /* Docsify top nav sits under our bar */
    .app-nav { margin-top: 4px; }
  </style>
</head>
<body>
  <!-- Full paths required for GitHub project pages (/learning-hub/) -->
  <nav id="quick-nav">
    <strong>Quick:</strong>
    <a href="/learning-hub/#/">Home</a>
    <a href="/learning-hub/#/05-spring-boot/interview/README">Spring Interview</a>
    <a href="/learning-hub/#/05-spring-boot/interview/why-answers">Spring WHY</a>
    <a href="/learning-hub/#/05-spring-boot/interview/annotations">Annotations</a>
    <a href="/learning-hub/#/05-spring-boot/interview/core-basics">Core</a>
    <a href="/learning-hub/#/05-spring-boot/interview/interview-qa">Spring Q&amp;A</a>
    <a href="/learning-hub/#/03-dsa-and-interview/oops/why-answers">OOPs WHY</a>
    <a href="/learning-hub/#/03-dsa-and-interview/oops/README">OOPs</a>
    <a href="/learning-hub/#/03-dsa-and-interview/INTERVIEW-PREP">Roadmap</a>
  </nav>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'Learning Hub',
      repo: 'sys32805/learning-hub',
      basePath: '/learning-hub/',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      alias: {
        '/.*/_sidebar.md': '/learning-hub/_sidebar.md',
        '/.*/_navbar.md': '/learning-hub/_navbar.md'
      },
      requestHeaders: {
        'cache-control': 'no-cache'
      },
      auto2top: true,
      relativePath: false,
      routerMode: 'hash',
      notFoundPage: false,
      ext: '.md',
      search: {
        placeholder: 'Search notes…',
        noData: 'No results',
        depth: 3
      },
      copyCode: { buttonText: 'Copy', successText: 'Copied' },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      }
    }

    // Force Docsify to navigate when quick-nav is clicked
    document.getElementById('quick-nav').addEventListener('click', function (e) {
      var a = e.target.closest('a');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      var marker = '/learning-hub/#';
      var i = href.indexOf(marker);
      if (i === -1) return;
      e.preventDefault();
      var hashPath = href.substring(i + marker.length); // e.g. /05-spring-boot/...
      if (!hashPath.startsWith('/')) hashPath = '/' + hashPath;
      if (window.location.hash === '#' + hashPath) {
        // same page — force reload route
        window.location.hash = '#/';
        setTimeout(function () { window.location.hash = '#' + hashPath; }, 0);
      } else {
        window.location.hash = '#' + hashPath;
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
</body>
</html>
