<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning Hub — sys32805</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Personal learning hub: Java OOPs, DSA, LeetCode, Spring Boot, Drupal" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root { --theme-color: #0f766e; }
    .markdown-section { max-width: 860px; }
    .markdown-section pre { border-radius: 8px; }
    .markdown-section table { display: table; width: 100%; }
    .app-nav a { margin: 0 8px; }
  </style>
</head>
<body>
  <div id="app">Loading learning hub…</div>
  <script>
    window.$docsify = {
      name: 'Learning Hub',
      repo: 'https://github.com/sys32805/learning-hub',
      // Required for GitHub project pages: site lives under /learning-hub/
      basePath: '/learning-hub/',
      homepage: 'README.md',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      auto2top: true,
      relativePath: false,
      subMaxLevel: 2,
      maxLevel: 3,
      search: {
        placeholder: 'Search notes…',
        noData: 'No results',
        path: 'auto',
        depth: 3
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
